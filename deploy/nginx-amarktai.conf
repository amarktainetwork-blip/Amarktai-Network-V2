# ═══════════════════════════════════════════════════════════════
# AmarktAI Network V2 — Nginx Reverse Proxy Configuration
# ═══════════════════════════════════════════════════════════════
#
# Install:
#   sudo cp deploy/nginx-amarktai.conf /etc/nginx/sites-available/amarktai
#   sudo ln -sf /etc/nginx/sites-available/amarktai /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# IMPORTANT: ALL requests go to the Dashboard (port 3000).
# The Dashboard's Next.js app handles routing internally:
#   - /api/auth/login → proxies to Fastify API (port 3001)
#   - /api/v1/*       → rewrites to Fastify API (port 3001)
#   - /api/*          → Next.js route handlers
#   - /*              → Next.js pages
#
# Do NOT add a separate location /api/ block that proxies to port 3001.
# That would bypass the Dashboard's route handlers.
# ═══════════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirect ──────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name amarktai.co.za www.amarktai.co.za;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name amarktai.co.za www.amarktai.co.za;

    # ── SSL certificates (Let's Encrypt) ───────────────────────
    ssl_certificate     /etc/letsencrypt/live/amarktai.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amarktai.co.za/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Logging ────────────────────────────────────────────────
    access_log /var/log/nginx/amarktai_access.log;
    error_log  /var/log/nginx/amarktai_error.log warn;

    # ── Security headers ───────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Proxy ALL requests to the Dashboard container ──────────
    # The Dashboard (Next.js) handles all routing internally.
    # It proxies /api/* requests to the Fastify API as needed.
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket / upgrade support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;

        # Buffer tuning for streaming responses
        proxy_buffering    off;
        proxy_buffer_size  16k;
    }

    # ── Static assets — cache aggressively ─────────────────────
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Public files ───────────────────────────────────────────
    location ~* ^/(?:favicon\.ico|robots\.txt|sitemap\.xml|Amarktai-logo\.png)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }
}
