# ═══════════════════════════════════════════════════════════════
# AmarktAI Network V2 — Production Docker Compose
# ═══════════════════════════════════════════════════════════════
# Usage:
#   cp .env.example .env   # Fill in real values
#   docker compose build --no-cache
#   docker compose up -d
#   docker compose logs -f
# ═══════════════════════════════════════════════════════════════

services:
  # ── MariaDB ─────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-amarktai}
      MYSQL_USER: ${MYSQL_USER:-amarktai}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - amarktai

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - amarktai

  # ── Qdrant ──────────────────────────────────────────────────
  # Healthcheck removed: Qdrant image has no curl/wget.
  # Real Qdrant readiness is verified by the API /health endpoint.
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    networks:
      - amarktai

  # ── SearXNG internal metasearch ─────────────────────────────
  # No host port is published. Only services on the private Compose network
  # can use the JSON search API.
  searxng:
    image: docker.io/searxng/searxng:2026.7.17-81c9c2386
    restart: unless-stopped
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:?SEARXNG_SECRET must be set}
      SEARXNG_BASE_URL: http://searxng:8080/
      SEARXNG_LIMITER: "false"
      SEARXNG_PUBLIC_INSTANCE: "false"
      SEARXNG_METHOD: GET
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --quiet --tries=1 --spider http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      - amarktai

  # ── API (Fastify) ───────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: amarktai/api:${GIT_SHA:?GIT_SHA must be the exact deployment commit}
    restart: "no"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-amarktai}:${MYSQL_PASSWORD}@mariadb:3306/${MYSQL_DATABASE:-amarktai}
      REDIS_URL: redis://redis:6379
    entrypoint: ["node", "scripts/prisma-migrate-deploy.mjs"]
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - amarktai

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: amarktai/api:${GIT_SHA:?GIT_SHA must be the exact deployment commit}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-amarktai}:${MYSQL_PASSWORD}@mariadb:3306/${MYSQL_DATABASE:-amarktai}
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      SEARXNG_URL: http://searxng:8080
      RESEARCH_SEARCH_TIMEOUT_MS: ${RESEARCH_SEARCH_TIMEOUT_MS:-20000}
      RESEARCH_BROWSER_TIMEOUT_MS: ${RESEARCH_BROWSER_TIMEOUT_MS:-45000}
      RESEARCH_ROBOTS_TIMEOUT_MS: ${RESEARCH_ROBOTS_TIMEOUT_MS:-10000}
      RESEARCH_MAX_REDIRECTS: ${RESEARCH_MAX_REDIRECTS:-5}
      RESEARCH_MAX_PAGES: ${RESEARCH_MAX_PAGES:-8}
      RESEARCH_MAX_BYTES_PER_PAGE: ${RESEARCH_MAX_BYTES_PER_PAGE:-1500000}
      GIT_SHA: ${GIT_SHA}
      BUILD_TIME: ${BUILD_TIME:?BUILD_TIME must be set}
      SERVICE_NAME: amarktai-api
      APP_VERSION: ${APP_VERSION:-1.0.0}
      WORKER_HEALTH_URL: http://worker:3002/health
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - artifact_storage:/var/www/amarktai/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      searxng:
        condition: service_healthy
    networks:
      - amarktai

  # ── Worker (BullMQ) ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: amarktai/worker:${GIT_SHA:?GIT_SHA must be the exact deployment commit}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-amarktai}:${MYSQL_PASSWORD}@mariadb:3306/${MYSQL_DATABASE:-amarktai}
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      SEARXNG_URL: http://searxng:8080
      RESEARCH_SEARCH_TIMEOUT_MS: ${RESEARCH_SEARCH_TIMEOUT_MS:-20000}
      RESEARCH_BROWSER_TIMEOUT_MS: ${RESEARCH_BROWSER_TIMEOUT_MS:-45000}
      RESEARCH_ROBOTS_TIMEOUT_MS: ${RESEARCH_ROBOTS_TIMEOUT_MS:-10000}
      RESEARCH_MAX_REDIRECTS: ${RESEARCH_MAX_REDIRECTS:-5}
      RESEARCH_MAX_PAGES: ${RESEARCH_MAX_PAGES:-8}
      RESEARCH_MAX_BYTES_PER_PAGE: ${RESEARCH_MAX_BYTES_PER_PAGE:-1500000}
      GIT_SHA: ${GIT_SHA}
      BUILD_TIME: ${BUILD_TIME:?BUILD_TIME must be set}
      SERVICE_NAME: amarktai-worker
      APP_VERSION: ${APP_VERSION:-1.0.0}
      WORKER_HEALTH_PORT: 3002
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - artifact_storage:/var/www/amarktai/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      searxng:
        condition: service_healthy
    networks:
      - amarktai

  # ── Dashboard (Next.js) ─────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: amarktai/dashboard:${GIT_SHA:?GIT_SHA must be the exact deployment commit}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_URL: http://api:3001
      GIT_SHA: ${GIT_SHA}
      BUILD_TIME: ${BUILD_TIME:?BUILD_TIME must be set}
      SERVICE_NAME: amarktai-dashboard
      APP_VERSION: ${APP_VERSION:-1.0.0}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/build-identity', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - amarktai

# ── Volumes ──────────────────────────────────────────────────
volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  artifact_storage:
    driver: local

# ── Networks ─────────────────────────────────────────────────
networks:
  amarktai:
    driver: bridge
