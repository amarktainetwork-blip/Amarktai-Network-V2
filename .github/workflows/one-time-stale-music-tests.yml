name: one-time-stale-music-tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/production-activation-music-longform
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Align stale music truth assertions
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old_lines: list[str], new_lines: list[str]) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              old = '\n'.join(old_lines)
              new = '\n'.join(new_lines)
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one target, found {count}')
              target.write_text(text.replace(old, new), encoding='utf-8')

          replace_once('tests/canonical-runtime-truth.test.js', [
            '    expect(music.eligibleProviders).toEqual([])',
            '    expect(music.eligibleModels).toEqual([])',
            '    expect(music.executableNow).toBe(false)',
            '    expect(music.liveProven).toBe(false)',
            "    expect(music.classification).toBe('EXECUTOR_PRESENT')",
          ], [
            "    expect(music.eligibleProviders).toEqual(['genx'])",
            '    expect(music.eligibleModels).toEqual(expect.arrayContaining([',
            "      expect.objectContaining({ provider: 'genx', modelId: 'lyria-3-clip-preview', executorId: 'genx.music-generation' }),",
            '    ]))',
            '    expect(music.executableNow).toBe(true)',
            '    expect(music.liveProven).toBe(false)',
            "    expect(music.classification).toBe('EXECUTABLE_NOT_LIVE_PROVEN')",
          ])

          replace_once('tests/canonical-runtime-truth.test.js', [
            '    expect(music.liveProven).toBe(false)',
            "    expect(music.classification).toBe('EXECUTOR_PRESENT')",
          ], [
            '    expect(music.liveProven).toBe(false)',
            '    expect(music.executableNow).toBe(true)',
            "    expect(music.classification).toBe('EXECUTABLE_NOT_LIVE_PROVEN')",
          ])

          replace_once('tests/provider-model-discovery-router-catalogue.test.js', [
            '    expect(configuredMusic.executableNow).toBe(false)',
            "    expect(getExecutorRegistrations('music_generation').map(entry => entry.provider)).toEqual(['genx'])",
          ], [
            '    expect(configuredMusic.executableNow).toBe(true)',
            "    expect(configuredMusic.eligibleProviders).toEqual(['genx'])",
            "    expect(configuredMusic.classification).toBe('EXECUTABLE_NOT_LIVE_PROVEN')",
            "    expect(getExecutorRegistrations('music_generation').map(entry => entry.provider)).toEqual(['genx'])",
          ])
          PY

      - name: Install dependencies and generate Prisma
        run: |
          npm ci --ignore-scripts
          npx prisma generate

      - name: Run affected tests
        run: npx vitest run tests/canonical-runtime-truth.test.js tests/provider-model-discovery-router-catalogue.test.js tests/music-generation-foundation.test.js tests/production-smoke-truth-alignment.test.ts

      - name: Commit test alignment
        shell: bash
        run: |
          git config user.name "AmarktAI Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add tests/canonical-runtime-truth.test.js tests/provider-model-discovery-router-catalogue.test.js
          git diff --cached --check
          git commit -m "test: align canonical music execution truth"
          git push origin HEAD:feat/production-activation-music-longform
