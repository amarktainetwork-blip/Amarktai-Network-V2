name: release-candidate-checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [feat/production-activation-music-longform]

permissions:
  contents: write

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-production-smoke-hotfix:
    if: github.event_name == 'push' && github.ref_name == 'feat/production-activation-music-longform'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/production-activation-music-longform
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply reviewed source fixes idempotently
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          from textwrap import dedent

          def replace_or_verify(path: str, old_lines: list[str], new_lines: list[str]) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              old = '\n'.join(old_lines)
              new = '\n'.join(new_lines)
              if new in text:
                  return
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one old target or the verified new target; old count={count}')
              target.write_text(text.replace(old, new), encoding='utf-8')

          replace_or_verify(
              'apps/api/src/routes/admin-providers.ts',
              [
                  '    const providers = truth.providers.map((provider) => ({',
                  '      ...credentialsByProvider.get(provider.provider),',
                  '      ...provider,',
                  '      providerKey: provider.provider,',
                  '    }))',
              ],
              [
                  '    const providers = truth.providers.map((provider) => ({',
                  '      ...credentialsByProvider.get(provider.provider),',
                  '      ...provider,',
                  '      providerKey: provider.provider,',
                  '      configured: provider.credentialConfigured,',
                  '      runtimeConfigured: provider.configured,',
                  '    }))',
              ],
          )

          replace_or_verify(
              'packages/core/src/model-catalog.ts',
              [
                  "  if (model.status !== 'available' || model.policyRestrictedByApp) return false",
                  "  if (!model.liveDiscovered && model.source !== 'static_verified') return false",
                  '  const raw = model.rawMetadata ?? {}',
              ],
              [
                  "  if (model.status !== 'available' || model.policyRestrictedByApp) return false",
                  '  const hasCompleteExecutionContract = model.endpointShapeKnown === true',
                  '    && model.requestShapeKnown === true',
                  '    && model.responseShapeKnown === true',
                  '    && model.providerClientExists === true',
                  '    && model.workerExecutorExists === true',
                  '  const sourceEligible = model.liveDiscovered === true',
                  "    || model.source === 'static_verified'",
                  "    || ((model.source === 'docs_fallback' || model.source === 'manual_seed') && hasCompleteExecutionContract)",
                  '  if (!sourceEligible) return false',
                  '  const raw = model.rawMetadata ?? {}',
              ],
          )

          Path('tests/production-smoke-truth-alignment.test.ts').write_text(dedent('''\
          import { readFileSync } from 'node:fs'
          import { describe, expect, it } from 'vitest'
          import { getModelRecord, isModelRouteCompatible, type ModelRecord } from '@amarktai/core'

          describe('production smoke truth alignment', () => {
            it('keeps provider credential configuration distinct from runtime eligibility', () => {
              const source = readFileSync('apps/api/src/routes/admin-providers.ts', 'utf8')
              expect(source).toContain('configured: provider.credentialConfigured')
              expect(source).toContain('runtimeConfigured: provider.configured')
            })

            it('accepts the fully contracted GenX Lyria docs fallback without claiming live discovery', () => {
              const lyria = getModelRecord('genx', 'lyria-3-clip-preview')
              expect(lyria).toBeDefined()
              expect(lyria?.source).toBe('docs_fallback')
              expect(lyria?.liveDiscovered).not.toBe(true)
              expect(isModelRouteCompatible(lyria!, 'music_generation')).toBe(true)
            })

            it('accepts a persisted manual projection only when the complete execution contract is present', () => {
              const model: ModelRecord = {
                provider: 'genx', modelId: 'contracted-music', displayName: 'Contracted Music',
                capabilities: ['music_generation'], status: 'available', qualityTier: 'balanced',
                latencyTier: 'high', costTier: 'premium', supportsArtifacts: true,
                supportsStreaming: false, supportsBatch: false, executable: false,
                notes: '', source: 'manual_seed', category: 'music', providerCategory: 'music',
                modalitiesIn: ['text'], modalitiesOut: ['audio'], transportProfile: 'async_job_poll',
                endpointFamily: 'genx_generation_v1', endpointShapeKnown: true,
                requestShapeKnown: true, responseShapeKnown: true,
                providerClientExists: true, workerExecutorExists: true,
              }
              expect(isModelRouteCompatible(model, 'music_generation')).toBe(true)
            })

            it('continues to reject docs/manual models with incomplete execution evidence', () => {
              const model: ModelRecord = {
                provider: 'genx', modelId: 'unknown-music', displayName: 'Unknown Music',
                capabilities: ['music_generation'], status: 'available', qualityTier: 'balanced',
                latencyTier: 'high', costTier: 'premium', supportsArtifacts: true,
                supportsStreaming: false, supportsBatch: false, executable: false,
                notes: '', source: 'manual_seed', category: 'music', providerCategory: 'music',
                modalitiesIn: ['text'], modalitiesOut: ['audio'], transportProfile: 'async_job_poll',
                endpointFamily: 'genx_generation_v1', endpointShapeKnown: true,
                requestShapeKnown: false, responseShapeKnown: true,
                providerClientExists: true, workerExecutorExists: true,
              }
              expect(isModelRouteCompatible(model, 'music_generation')).toBe(false)
            })
          })
          '''), encoding='utf-8')
          PY

          rm -f .github/workflows/one-time-production-smoke-hotfix.yml
          git show "${GITHUB_SHA}^:.github/workflows/release-candidate-checks.yml" > .github/workflows/release-candidate-checks.yml

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Validate, build, and run focused regressions
        run: |
          npx prisma validate
          npx prisma generate
          npm run build:backend
          npx vitest run tests/production-smoke-truth-alignment.test.ts tests/admin-provider-routes-contract.test.js tests/genx-music-contract.test.js tests/music-generation-foundation.test.js

      - name: Commit clean source hotfix
        shell: bash
        run: |
          git config user.name "AmarktAI Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: align final production smoke truth"
          git push origin HEAD:feat/production-activation-music-longform

  static-and-build:
    needs: apply-production-smoke-hotfix
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/production-activation-music-longform
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate ephemeral test credentials
        shell: bash
        run: |
          JWT_SECRET="$(openssl rand -hex 32)"
          PROVIDER_KEY_ENCRYPTION_SECRET="$(openssl rand -hex 32)"
          FIXTURE_DB_ROOT_PASSWORD="$(openssl rand -hex 24)"
          FIXTURE_DB_PASSWORD="$(openssl rand -hex 24)"
          FIXTURE_JWT_SECRET="$(openssl rand -hex 32)"
          FIXTURE_ADMIN_PASSWORD="$(openssl rand -hex 24)"
          for value in "$JWT_SECRET" "$PROVIDER_KEY_ENCRYPTION_SECRET" "$FIXTURE_DB_ROOT_PASSWORD" "$FIXTURE_DB_PASSWORD" "$FIXTURE_JWT_SECRET" "$FIXTURE_ADMIN_PASSWORD"; do
            echo "::add-mask::$value"
          done
          {
            echo "JWT_SECRET=$JWT_SECRET"
            echo "PROVIDER_KEY_ENCRYPTION_SECRET=$PROVIDER_KEY_ENCRYPTION_SECRET"
            echo "FIXTURE_DB_ROOT_PASSWORD=$FIXTURE_DB_ROOT_PASSWORD"
            echo "FIXTURE_DB_PASSWORD=$FIXTURE_DB_PASSWORD"
            echo "FIXTURE_JWT_SECRET=$FIXTURE_JWT_SECRET"
            echo "FIXTURE_ADMIN_PASSWORD=$FIXTURE_ADMIN_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Install locked dependencies
        run: npm ci

      - name: Validate and generate Prisma client
        run: |
          npx prisma generate --schema=prisma/schema.prisma
          npm run prisma:validate

      - name: Build backend packages
        run: npm run build:backend

      - name: Run complete unit and contract suite
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee static-test-output.log

      - name: Upload static test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-test-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 14
          path: static-test-output.log

      - name: Build dashboard
        run: npm run build

      - name: Completion audit
        run: npm run audit

      - name: Router and app proof three times
        run: |
          npm run proof:router-app-contract
          npm run proof:router-app-contract
          npm run proof:router-app-contract

      - name: Direct-provider static proof
        run: node scripts/proof-direct-provider-capabilities.mjs --static --strict

      - name: Long-form runtime static proof
        run: node scripts/proof-long-form-runtime.mjs --static-only

      - name: Long-form closure static proof
        run: node scripts/proof-long-form-closure.mjs --static --strict

      - name: Music regression proof
        run: npm run proof:music-regression

      - name: Production preflight and proof syntax
        run: |
          npm run proof:production-preflight
          node --check scripts/proof-production-release-candidate.mjs
          node --check scripts/proof-release-fixture.mjs
          node --check scripts/release-fixture-queue-control.mjs
          node --check tests/browser/release-candidate.spec.mjs

      - name: Docker Compose and deployment shell syntax
        env:
          GIT_SHA: ${{ github.sha }}
          BUILD_TIME: '2026-01-01T00:00:00.000Z'
          FIXTURE_GIT_SHA: ${{ github.sha }}
          FIXTURE_BUILD_TIME: '2026-01-01T00:00:00.000Z'
        run: |
          trap 'rm -f .env' EXIT
          cp .env.example .env
          docker compose config --quiet
          docker compose -f docker-compose.release-fixture.yml config --quiet
          bash -n deploy/*.sh scripts/*.sh

      - name: Production dependency audit
        run: npm audit --omit=dev

      - name: Patch hygiene
        run: |
          git diff --check
          test -z "$(git status --porcelain --untracked-files=no)"

  real-service-fixture:
    needs: static-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NODE_ENV: test
      RELEASE_FIXTURE_OUTPUT_DIR: release-fixture-output
      PLAYWRIGHT_HTML_OPEN: never
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/production-activation-music-longform
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate ephemeral fixture credentials
        shell: bash
        run: |
          FIXTURE_DB_ROOT_PASSWORD="$(openssl rand -hex 24)"
          FIXTURE_DB_PASSWORD="$(openssl rand -hex 24)"
          FIXTURE_JWT_SECRET="$(openssl rand -hex 32)"
          FIXTURE_ADMIN_PASSWORD="$(openssl rand -hex 24)"
          for value in "$FIXTURE_DB_ROOT_PASSWORD" "$FIXTURE_DB_PASSWORD" "$FIXTURE_JWT_SECRET" "$FIXTURE_ADMIN_PASSWORD"; do
            echo "::add-mask::$value"
          done
          {
            echo "FIXTURE_DB_ROOT_PASSWORD=$FIXTURE_DB_ROOT_PASSWORD"
            echo "FIXTURE_DB_PASSWORD=$FIXTURE_DB_PASSWORD"
            echo "FIXTURE_JWT_SECRET=$FIXTURE_JWT_SECRET"
            echo "FIXTURE_ADMIN_PASSWORD=$FIXTURE_ADMIN_PASSWORD"
            echo "FIXTURE_GIT_SHA=$GITHUB_SHA"
            echo "FIXTURE_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          } >> "$GITHUB_ENV"

      - name: Install locked dependencies
        run: npm ci

      - name: Install Playwright Chromium and Linux dependencies
        run: npx playwright install --with-deps chromium

      - name: Confirm Docker and Docker Compose
        run: |
          docker version
          docker compose version

      - name: Verify disposable MariaDB migrations
        shell: bash
        run: |
          mkdir -p "$RELEASE_FIXTURE_OUTPUT_DIR"
          set -o pipefail
          bash scripts/verify-migrations-disposable.sh 2>&1 | tee "$RELEASE_FIXTURE_OUTPUT_DIR/migration.log"

      - name: Run authoritative real-service release fixture
        shell: bash
        run: |
          set -o pipefail
          npm run proof 2>&1 | tee "$RELEASE_FIXTURE_OUTPUT_DIR/fixture-run.log"

      - name: Upload fixture proof and failure diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-service-fixture-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            release-fixture-output/
            playwright-report/
            test-results/

      - name: Remove fixture containers, networks, and volumes
        if: always()
        run: docker compose -f docker-compose.release-fixture.yml down --volumes --remove-orphans
