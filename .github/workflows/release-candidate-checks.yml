name: release-candidate-checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [feat/production-activation-music-longform]

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate ephemeral test credentials
        shell: bash
        run: |
          {
            echo "JWT_SECRET=$(openssl rand -hex 32)"
            echo "PROVIDER_KEY_ENCRYPTION_SECRET=$(openssl rand -hex 32)"
            echo "FIXTURE_DB_ROOT_PASSWORD=$(openssl rand -hex 24)"
            echo "FIXTURE_DB_PASSWORD=$(openssl rand -hex 24)"
            echo "FIXTURE_JWT_SECRET=$(openssl rand -hex 32)"
            echo "FIXTURE_ADMIN_PASSWORD=$(openssl rand -hex 24)"
          } >> "$GITHUB_ENV"

      - name: Install locked dependencies
        run: npm ci

      - name: Validate and generate Prisma client
        run: |
          npx prisma generate --schema=prisma/schema.prisma
          npm run prisma:validate

      - name: Build backend packages
        run: npm run build:backend

      - name: Run complete unit and contract suite
        run: npm test

      - name: Build dashboard
        run: npm run build

      - name: Completion audit
        run: npm run audit

      - name: Router and app proof three times
        run: |
          npm run proof
          npm run proof
          npm run proof

      - name: Direct-provider static proof
        run: node scripts/proof-direct-provider-capabilities.mjs --static --strict

      - name: Long-form runtime static proof
        run: node scripts/proof-long-form-runtime.mjs --static-only

      - name: Long-form closure static proof
        run: node scripts/proof-long-form-closure.mjs --static --strict

      - name: Music regression proof
        run: npm run proof:music-regression

      - name: Production preflight and proof syntax
        run: |
          npm run proof:production-preflight
          node --check scripts/proof-production-release-candidate.mjs
          node --check scripts/proof-release-fixture.mjs
          node --check scripts/release-fixture-queue-control.mjs
          node --check tests/browser/release-candidate.spec.mjs

      - name: Docker Compose and deployment shell syntax
        env:
          GIT_SHA: ${{ github.sha }}
          BUILD_TIME: '2026-01-01T00:00:00.000Z'
          FIXTURE_GIT_SHA: ${{ github.sha }}
          FIXTURE_BUILD_TIME: '2026-01-01T00:00:00.000Z'
        run: |
          trap 'rm -f .env' EXIT
          cp .env.example .env
          docker compose config --quiet
          docker compose -f docker-compose.release-fixture.yml config --quiet
          bash -n deploy/*.sh scripts/*.sh

      - name: Production dependency audit
        run: npm audit --omit=dev

      - name: Patch hygiene
        run: |
          git diff --check
          test -z "$(git status --porcelain --untracked-files=no)"
