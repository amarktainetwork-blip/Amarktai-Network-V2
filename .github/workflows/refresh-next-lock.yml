name: refresh-next-lock

on:
  push:
    branches: [feat/batch-b-platform-closure]
    paths:
      - package.json
      - .github/workflows/refresh-next-lock.yml

permissions:
  contents: write

concurrency:
  group: refresh-next-lock-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/batch-b-platform-closure
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Refresh lockfile from package manifest
        run: npm install --package-lock-only --ignore-scripts

      - name: Verify patched production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Commit generated lockfile
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "LOCKFILE_ALREADY_CURRENT=PASS"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "fix: refresh patched Next.js lockfile"
          git push origin HEAD:feat/batch-b-platform-closure
