name: authoritative-status-map

on:
  pull_request:
    branches: [main, feat/production-activation-music-longform]
  push:
    branches: [feat/batch-b-platform-closure]

permissions:
  contents: read

concurrency:
  group: authoritative-status-map-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VALIDATED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify exact head checkout
        shell: bash
        run: |
          actual_sha="$(git rev-parse HEAD)"
          test "$actual_sha" = "$VALIDATED_SHA"
          echo "VALIDATED_HEAD_SHA=$actual_sha"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Generate canonical 68-capability map
        run: npx tsx scripts/generate-authoritative-status-map.mjs --output=authoritative-status-map.json

      - name: Capture current approved public DeepInfra standard-model catalogue
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs'
          import { getRuntimeModelPolicyBlocker } from './packages/core/src/model-family-policy.ts'
          const response = await fetch('https://api.deepinfra.com/models/list', { headers: { Accept: 'application/json' } })
          if (!response.ok) throw new Error(`DeepInfra model list failed: ${response.status}`)
          const rows = await response.json()
          const relevantTypes = new Set([
            'image-to-image', 'image-classification', 'zero-shot-image-classification',
            'object-detection', 'zero-shot-object-detection', 'image-segmentation',
            'depth-estimation', 'keypoint-detection', 'video-classification',
            'audio-classification', 'voice-activity-detection', 'text-to-speech',
          ])
          const relevant = rows
            .filter((row) => relevantTypes.has(String(row.reported_type || row.type || '').toLowerCase().replaceAll('_', '-')))
            .map((row) => ({
              modelId: row.model_name,
              type: row.type,
              reportedType: row.reported_type,
              deprecated: row.deprecated ?? null,
              replacedBy: row.replaced_by ?? null,
              private: Number(row.private || 0),
              tags: Array.isArray(row.tags) ? row.tags : [],
              pricing: row.pricing ?? null,
            }))
            .filter((row) => row.modelId && row.private === 0 && !row.deprecated)
          const excluded = relevant
            .map((row) => ({ modelId: row.modelId, blocker: getRuntimeModelPolicyBlocker(row.modelId) }))
            .filter((row) => row.blocker)
          const excludedIds = new Set(excluded.map((row) => row.modelId))
          const models = relevant
            .filter((row) => !excludedIds.has(row.modelId))
            .sort((a, b) => `${a.reportedType}:${a.modelId}`.localeCompare(`${b.reportedType}:${b.modelId}`))
          fs.writeFileSync('deepinfra-standard-models.json', `${JSON.stringify({
            capturedAt: new Date().toISOString(),
            source: 'https://api.deepinfra.com/models/list',
            policySource: 'packages/core/src/model-family-policy.ts',
            count: models.length,
            excludedCount: excluded.length,
            excludedReasons: [...new Set(excluded.map((row) => row.blocker))],
            models,
          }, null, 2)}\n`)
          console.log(JSON.stringify({ relevantDeepInfraModels: models.length, policyExcluded: excluded.length, types: [...new Set(models.map((row) => row.reportedType || row.type))] }))
          NODE

      - name: Validate generated truth artifacts
        shell: bash
        run: |
          node -e "const fs=require('fs'); const map=JSON.parse(fs.readFileSync('authoritative-status-map.json','utf8')); if(map.counts.catalogue!==68) throw new Error('Expected 68 capabilities'); if(map.capabilities.length!==68) throw new Error('Expected 68 capability rows'); const models=JSON.parse(fs.readFileSync('deepinfra-standard-models.json','utf8')); if(!Array.isArray(models.models)) throw new Error('Expected DeepInfra model rows'); if(models.models.some((row)=>/(?:^|[\/_-])(?:qwen|xiaomi[-_]?mimo|mimo)(?:$|[\/_-])/i.test(row.modelId))) throw new Error('Removed model family entered approved catalogue'); console.log(JSON.stringify({capabilities:map.counts, deepinfraModels:models.count, policyExcluded:models.excludedCount}));"

      - name: Upload authoritative status map
        uses: actions/upload-artifact@v4
        with:
          name: authoritative-status-map-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: error
          path: |
            authoritative-status-map.json
            deepinfra-standard-models.json
