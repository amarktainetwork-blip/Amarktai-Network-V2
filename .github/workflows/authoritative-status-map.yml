name: authoritative-status-map

on:
  pull_request:
    branches: [main, feat/production-activation-music-longform]
  push:
    branches: [feat/batch-b-platform-closure]

permissions:
  contents: read

concurrency:
  group: authoritative-status-map-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VALIDATED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify exact head checkout
        shell: bash
        run: |
          actual_sha="$(git rev-parse HEAD)"
          test "$actual_sha" = "$VALIDATED_SHA"
          echo "VALIDATED_HEAD_SHA=$actual_sha"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Generate canonical 68-capability map
        run: npx tsx scripts/generate-authoritative-status-map.mjs --output=authoritative-status-map.json

      - name: Capture current approved public DeepInfra standard-model catalogue
        run: npx tsx scripts/capture-deepinfra-standard-models.ts --output=deepinfra-standard-models.json

      - name: Validate generated truth artifacts
        shell: bash
        run: |
          node -e "const fs=require('fs'); const map=JSON.parse(fs.readFileSync('authoritative-status-map.json','utf8')); if(map.counts.catalogue!==68) throw new Error('Expected 68 capabilities'); if(map.capabilities.length!==68) throw new Error('Expected 68 capability rows'); const models=JSON.parse(fs.readFileSync('deepinfra-standard-models.json','utf8')); if(!Array.isArray(models.models)) throw new Error('Expected DeepInfra model rows'); if(models.models.some((row)=>/(?:^|[\/_-])(?:qwen|xiaomi[-_]?mimo|mimo)(?:$|[\/_-])/i.test(row.modelId))) throw new Error('Removed model family entered approved catalogue'); console.log(JSON.stringify({capabilities:map.counts, deepinfraModels:models.count, policyExcluded:models.excludedCount}));"

      - name: Upload authoritative status map
        uses: actions/upload-artifact@v4
        with:
          name: authoritative-status-map-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          if-no-files-found: error
          path: |
            authoritative-status-map.json
            deepinfra-standard-models.json
