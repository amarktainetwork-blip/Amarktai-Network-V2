name: security-lock-refresh

on:
  push:
    branches: [feat/production-activation-music-longform]
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/security-lock-refresh.yml

permissions:
  contents: write

concurrency:
  group: security-lock-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/production-activation-music-longform
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Patch the exact vulnerable transitive lock record
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = 'package-lock.json'
          const lock = JSON.parse(fs.readFileSync(path, 'utf8'))
          const key = 'node_modules/@crawlee/core/node_modules/brace-expansion'
          const current = lock.packages?.[key]
          if (!current) throw new Error(`Missing expected lock entry: ${key}`)
          if (!['2.1.1', '2.1.2'].includes(current.version)) {
            throw new Error(`Unexpected brace-expansion version at ${key}: ${current.version}`)
          }
          lock.packages[key] = {
            ...current,
            version: '2.1.2',
            resolved: 'https://registry.npmjs.org/brace-expansion/-/brace-expansion-2.1.2.tgz',
            integrity: 'sha512-fgFx7Hfoq60ytK2c7DhnF8jIvzYgOMxfugjLOSMHjLIPgenqa7S7oaagATUq99mV6IYvN2tRmC0wnTYX6iPbMw=='
          }
          fs.writeFileSync(path, `${JSON.stringify(lock, null, 2)}\n`)
          NODE

      - name: Prove the patched lock installs exactly
        run: npm ci --ignore-scripts

      - name: Prove the production dependency tree is clean
        run: npm audit --omit=dev

      - name: Commit only the verified lockfile
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo 'package-lock.json already contains the verified security patch'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'fix: refresh patched production dependency lock'
          git push origin HEAD:feat/production-activation-music-longform
