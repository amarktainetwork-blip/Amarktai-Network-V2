name: security-lock-refresh

on:
  push:
    branches: [feat/production-activation-music-longform]
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/security-lock-refresh.yml

permissions:
  contents: write

concurrency:
  group: security-lock-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/production-activation-music-longform
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Patch the verified registry integrity
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = 'package-lock.json'
          const lock = JSON.parse(fs.readFileSync(path, 'utf8'))
          const key = 'node_modules/@crawlee/core/node_modules/brace-expansion'
          const current = lock.packages?.[key]
          if (!current || current.version !== '2.1.2') {
            throw new Error(`Expected brace-expansion 2.1.2 at ${key}`)
          }
          lock.packages[key] = {
            ...current,
            resolved: 'https://registry.npmjs.org/brace-expansion/-/brace-expansion-2.1.2.tgz',
            integrity: 'sha512-w5JZcKgdhDOgOwm8H+KgbosopHMuGcl6qbulwjtz3SM7I7P3yW1eAjzMPLrIE+NQ9vjgANKHWeMHnrT0OXW1oA=='
          }
          fs.writeFileSync(path, `${JSON.stringify(lock, null, 2)}\n`)
          NODE

      - name: Prove the patched lock installs exactly
        run: npm ci --ignore-scripts

      - name: Prove the production dependency tree is clean
        run: npm audit --omit=dev

      - name: Commit only the verified lockfile
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'fix: correct patched dependency integrity'
          git push origin HEAD:feat/production-activation-music-longform
