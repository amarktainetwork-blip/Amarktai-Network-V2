name: amarktai-release-fixture

services:
  mariadb:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${FIXTURE_DB_ROOT_PASSWORD:?generated by proof-release-fixture.mjs}
      MYSQL_DATABASE: amarktai_fixture
      MYSQL_USER: amarktai_fixture
      MYSQL_PASSWORD: ${FIXTURE_DB_PASSWORD:?generated by proof-release-fixture.mjs}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 3s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/lib/mysql

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.15.5
    tmpfs:
      - /qdrant/storage

  searxng:
    image: docker.io/searxng/searxng:2026.7.17-81c9c2386
    environment:
      SEARXNG_SECRET: fixture-searxng-secret-not-production
      SEARXNG_BASE_URL: http://searxng:8080/
      SEARXNG_LIMITER: "false"
      SEARXNG_PUBLIC_INSTANCE: "false"
      SEARXNG_METHOD: GET
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --quiet --tries=1 --spider http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        GIT_SHA: ${FIXTURE_GIT_SHA:?generated by proof-release-fixture.mjs}
        BUILD_TIME: ${FIXTURE_BUILD_TIME:?generated by proof-release-fixture.mjs}
    environment:
      DATABASE_URL: mysql://amarktai_fixture:${FIXTURE_DB_PASSWORD}@mariadb:3306/amarktai_fixture
    entrypoint: ["node", "scripts/prisma-migrate-deploy.mjs"]
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        GIT_SHA: ${FIXTURE_GIT_SHA}
        BUILD_TIME: ${FIXTURE_BUILD_TIME}
    environment:
      NODE_ENV: test
      RELEASE_FIXTURE_MODE: "true"
      RELEASE_FIXTURE_SAFETY_TOKEN: amarktai-release-fixture-local-ci-v1
      AMARKTAI_TEST_FIXTURE_ADAPTER: release-candidate-v1
      DATABASE_URL: mysql://amarktai_fixture:${FIXTURE_DB_PASSWORD}@mariadb:3306/amarktai_fixture
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      SEARXNG_URL: http://searxng:8080
      STORAGE_ROOT: /var/www/amarktai/storage
      JWT_SECRET: ${FIXTURE_JWT_SECRET:?generated by proof-release-fixture.mjs}
      ADMIN_EMAIL: fixture-admin@invalid.example
      ADMIN_PASSWORD: ${FIXTURE_ADMIN_PASSWORD:?generated by proof-release-fixture.mjs}
      ADMIN_BOOTSTRAP_POLICY: required_if_missing
      GIT_SHA: ${FIXTURE_GIT_SHA}
      BUILD_TIME: ${FIXTURE_BUILD_TIME}
      SERVICE_NAME: amarktai-api
      APP_VERSION: 1.0.0
      RATE_LIMIT_MAX: 10000
      WORKER_HEALTH_URL: http://worker:3002/health
      PUBLIC_API_URL: http://api:3001
      GENX_API_KEY: fixture-genx-key-not-real
      TOGETHER_API_KEY: fixture-together-key-not-real
      DEEPINFRA_API_KEY: fixture-deepinfra-key-not-real
    ports:
      - "127.0.0.1:3211:3001"
    volumes:
      - fixture_artifacts:/var/www/amarktai/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      searxng:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
      args:
        GIT_SHA: ${FIXTURE_GIT_SHA}
        BUILD_TIME: ${FIXTURE_BUILD_TIME}
    environment:
      NODE_ENV: test
      RELEASE_FIXTURE_MODE: "true"
      RELEASE_FIXTURE_SAFETY_TOKEN: amarktai-release-fixture-local-ci-v1
      AMARKTAI_TEST_FIXTURE_ADAPTER: release-candidate-v1
      DATABASE_URL: mysql://amarktai_fixture:${FIXTURE_DB_PASSWORD}@mariadb:3306/amarktai_fixture
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      SEARXNG_URL: http://searxng:8080
      STORAGE_ROOT: /var/www/amarktai/storage
      GIT_SHA: ${FIXTURE_GIT_SHA}
      BUILD_TIME: ${FIXTURE_BUILD_TIME}
      SERVICE_NAME: amarktai-worker
      APP_VERSION: 1.0.0
      WORKER_HEALTH_PORT: 3002
      GENX_API_KEY: fixture-genx-key-not-real
      TOGETHER_API_KEY: fixture-together-key-not-real
      DEEPINFRA_API_KEY: fixture-deepinfra-key-not-real
    volumes:
      - fixture_artifacts:/var/www/amarktai/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      searxng:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
      args:
        GIT_SHA: ${FIXTURE_GIT_SHA}
        BUILD_TIME: ${FIXTURE_BUILD_TIME}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_URL: http://api:3001
      GIT_SHA: ${FIXTURE_GIT_SHA}
      BUILD_TIME: ${FIXTURE_BUILD_TIME}
      SERVICE_NAME: amarktai-dashboard
      APP_VERSION: 1.0.0
    ports:
      - "127.0.0.1:3210:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  fixture_artifacts:
